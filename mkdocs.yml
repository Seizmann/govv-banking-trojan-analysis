site_name: GOVV Banking Trojan — Analysis
site_description: Static & Dynamic analysis of Android/Btmob banking trojan targeting Bangladeshi bKash users. C2 confirmed at 65.20.66.209.
site_url: https://seizmann.github.io/govv-banking-trojan-analysis/
repo_url: https://github.com/Seizmann/govv-banking-trojan-analysis
repo_name: Seizmann/govv-banking-trojan-analysis

theme:
  name: material
  palette:
    - scheme: slate
      primary: red
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: red
      accent: deep-orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Technical Analysis:
    - Full Analysis: analysis.md
    - Static Findings: static-findings.md
  - Network & C2:
    - IOCs: iocs.md
    - C2 Protocol: c2-protocol.md
  - Timeline: timeline.md
  - Mitigations: mitigations.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Seizmann

copyright: Security Research — CC0 1.0
